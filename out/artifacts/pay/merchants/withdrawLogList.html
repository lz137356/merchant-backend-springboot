<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<link rel="stylesheet" href="css/custom.css">
<!-- 引入样式 -->
<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
<style>
    .demo-table-expand {
        font-size: 0;
    }

    .demo-table-expand label {
        width: 90px;
        color: #99a9bf;
    }

    .demo-table-expand .el-form-item {
        margin-right: 0;
        margin-bottom: 0;
        width: 50%;
    }
</style>
<body>
<div id="app" v-cloak v-loading.fullscreen.lock="fullscreenLoading">
    <template>
        <el-form :model="searchForm" ref="searchForm" label-width="90px">
            <el-row>
                <el-col :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="系统订单号" prop="id">
                        <el-input v-model="searchForm.id" placeholder=""></el-input>
                    </el-form-item>
                </el-col>
                <el-col :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="商户订单号" prop="orderId">
                        <el-input v-model="searchForm.orderId" placeholder=""></el-input>
                    </el-form-item>
                </el-col>
                <el-col :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="订单状态" prop="status">
                        <el-select v-model="searchForm.status" placeholder="请选择" value="">
                            <el-option label="请选择" value=""></el-option>
                            <el-option label="成功" value="2"></el-option>
                            <el-option label="处理中" value="1"></el-option>
                            <el-option label="未处理" value="0"></el-option>
                            <el-option label="失败重试" value="-1"></el-option>
                            <el-option label="失败" value="-2"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
                <el-col :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="同步状态" prop="syncCnt">
                        <el-select v-model="searchForm.syncCnt" placeholder="请选择">
                            <el-option label="请选择" value=""></el-option>
                            <el-option label="同步成功" value="1"></el-option>
                            <el-option label="未回调" value="0"></el-option>
                            <el-option label="失败重试" value="-1"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-row>
                <el-col :xl="4" :lg="8" :md="8" :sm="12" :xs="24" class="form-search">
                    <el-form-item label="起始时间">
                        <el-col :span="11">
                            <el-date-picker
                                    v-model="createDate"
                                    type="datetimerange"
                                    :default-time="['00:00:00', '23:59:59']"
                                    value-format="yyyy-MM-dd HH:mm:ss"
                                    placeholder="选择起始日期"
                                    :picker-options="pickerOptionsStart">
                            </el-date-picker>
                        </el-col>
                    </el-form-item>
                </el-col>

            </el-row>
            <el-row>
                <el-col :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="银行账号" prop="bankCardNo">
                        <el-input v-model="searchForm.bankCardNo" placeholder=""></el-input>
                    </el-form-item>
                </el-col>
                <el-col v-if="cpinfo.country === 'BRA'" :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="CPF" prop="cpf">
                        <el-input v-model="searchForm.cpf" placeholder=""></el-input>
                    </el-form-item>
                </el-col>
                <el-col v-if="cpinfo.country === 'BRA'" :xl="3" :lg="6" :md="6" :sm="8" :xs="24" class="form-search">
                    <el-form-item label="PIX账号" prop="pix_key">
                        <el-input v-model="searchForm.pix_key" placeholder=""></el-input>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-form-item class="search-button">
                <el-button type="primary" @click="search">查询</el-button>
                <el-button @click="resetForm('searchForm')">重置</el-button>
                <el-button @click="exportWithdrawLog()">导出</el-button>
            </el-form-item>
        </el-form>
        <el-table
                :data="tableData"
                style="width: 100%">
            <el-table-column type="expand">
                <template slot-scope="props">
                    <el-form label-position="left" inline class="demo-table-expand">
                        <el-form-item label="回调地址">
                            <span>{{ props.row.notifyUrl }}</span>
                        </el-form-item>
                        <el-form-item label="ip">
                            <span>{{ props.row.ip }}</span>
                        </el-form-item>
                        <el-form-item label="姓名">
                            <span>{{ props.row.bankAccountName }}</span>
                        </el-form-item>
                        <el-form-item label="邮箱">
                            <span>{{ props.row.email }}</span>
                        </el-form-item>
                        <el-form-item label="手机号">
                            <span>{{ props.row.mobile }}</span>
                        </el-form-item>
<!--                        <el-form-item label="失败原因">-->
<!--                            <span></span>-->
<!--                        </el-form-item>-->
                    </el-form>
                </template>
            </el-table-column>
            <el-table-column
                    prop="id"
                    label="订单号">
            </el-table-column>
            <el-table-column
                    prop="orderId"
                    label="商户订单号">
            </el-table-column>
            <el-table-column
                    prop="appId"
                    label="商户Id">
            </el-table-column>
            <el-table-column
                    prop="amount"
                    label="金额">
            </el-table-column>
            <el-table-column
                    prop="platformFee"
                    label="商户手续费">
            </el-table-column>
            <el-table-column
                    prop="bankCardNo"
                    label="银行账号">
            </el-table-column>
            <el-table-column
                    prop="documentId"
                    label="CPF"
                    v-if="cpinfo.country === 'BRA'"
            >
            </el-table-column>
            <el-table-column
                    prop="pixKey"
                    label="Pix账号"
                    v-if="cpinfo.country === 'BRA'"
            >
            </el-table-column>
            <el-table-column
                    prop="type"
                    label="到账类型">
            </el-table-column>
            <el-table-column
                    prop="bankCode"
                    label="银行编号">
            </el-table-column>
            <el-table-column
                    prop="branchCode"
                    label="分行编号">
            </el-table-column>
            <el-table-column
                    prop="status"
                    label="订单状态">
            </el-table-column>
            <el-table-column
                    prop="syncCnt"
                    label="回调状态">
            </el-table-column>
            <el-table-column
                    prop="createTime"
                    label="创建时间">
            </el-table-column>
            <el-table-column label="操作" width="300">
                <template slot-scope="scope">
                    <el-button v-if="false" :disabled="(scope.row.status !== '成功' && scope.row.status !== '失败')"
                               type="success"
                               round
                               @click="openSendNotifyMsgDrawer(scope.row)"
                               @change="">补发通知
                    </el-button>
                </template>
            </el-table-column>
        </el-table>
        <div style="text-align: center;margin-top:5px;">
            <el-pagination
                    background
                    layout="total, prev, pager, next"
                    :total="total" :current-page="searchForm.page" @current-change="pageChange">
            </el-pagination>
        </div>
        <el-drawer
                :visible.sync="sendNotifyDrawerVisable"
                :direction="direction"
                :before-close="handleClose"
                :close-on-click-modal="false"
                :show-close="false"
                custom-class="demo-drawer"
                style="overflow-y: auto"
                size="50%">
            <div class="" style="padding: 20px">
                <el-form>
                    <el-form-item label="回调单号" :label-width="formLabelWidth">
                        <el-input readonly v-model="sendNotifyMsgForm.id" autocomplete="off"></el-input>
                    </el-form-item>
                    <el-form-item label="回调地址" :label-width="formLabelWidth">
                        <el-input readonly v-model="sendNotifyMsgForm.url" autocomplete="off"></el-input>
                    </el-form-item>
                    <el-form-item label="回调数据" :label-width="formLabelWidth">
                        <el-input readonly v-model="sendNotifyMsgForm.notifyData" autocomplete="off"></el-input>
                    </el-form-item>
                    <el-form-item label="回调响应" :label-width="formLabelWidth">
                        <el-input type="textarea" style="resize: none" readonly :rows="12"
                                  v-model="sendNotifyMsgForm.notifyResp"
                                  autocomplete="off"></el-input>
                    </el-form-item>
                    <el-form-item label="回调分析" :label-width="formLabelWidth">
                        <el-input type="textarea" style="resize: none" readonly :rows="3"
                                  v-model="sendNotifyMsgForm.notifyAnalyze"
                                  autocomplete="off"></el-input>
                    </el-form-item>
                </el-form>
                <div class="demo-drawer__footer">
                    <el-button :disable="sending" type="success" @click="sendNotifyMsg(sendNotifyMsgForm.id)">{{sending
                        ?
                        '发送中...' : '发送'}}
                    </el-button>
                    <el-button @click="cancelNotifyMsgDrawer()">取 消</el-button>
                </div>
            </div>
        </el-drawer>
    </template>
</div>
</body>
<script src="../merchants/vue/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="../custom/custom.js"></script>
<script src="./js/qs.js"></script>
<!-- import Vue before Element -->
<script src="https://unpkg.com/vue/dist/vue.js"></script>
<!-- import JavaScript -->
<script src="https://unpkg.com/element-ui/lib/index.js"></script>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                fullscreenLoading: false,
                sendNotifyDrawerVisable: false,
                direction: 'rtl',
                createDate: [],
                withdrawDate: [],
                countryOptions: [],
                searchForm: {
                    id: '',
                    appId: '',
                    amount: '',
                    orderId: '',
                    type: '',
                    status: '',
                    syncCnt: '',
                    bankCardNo: '',
                    cpf: '',
                    pix_key: '',
                    startCreateTime: '',
                    endCreateTime: '',
                    startPayTime: '',
                    endPayTime: '',
                    page: 1,
                    limit: 10,
                    rowIndex: 0
                },
                tableData: [],
                total: 0,
                pickerOptionsStart: {},
                pickerOptionsEnd: {
                    disabledDate(time) {
                        if (this.dateStart) {
                            // 让用户可以选择开始结束同一天
                            var startCreateTime = new Date(this.dateStart).valueOf() - 8.64e7 + 1;
                        } else {
                            var startCreateTime = Date.now() - 8.64e7;
                        }
                        return time && time.valueOf() < startTime
                    }
                },
                withdrawTypeOptions: [],
                sendNotifyMsgForm: {
                    id: '',
                    url: '',
                    notifyData: '',
                    notifyResp: '',
                    notifyAnalyze: ''
                },
                formLabelWidth: 120,
                sending: false,
                cpinfo: {
                    country: ''
                }
            }
        },
        created() {
            this.queryAllWithdrawLog()
            this.initCpinfo()
        },
        methods: {
            queryAllWithdrawLog() {
                var that = this
                that.fullscreenLoading = true
                this.searchForm.startCreateTime = this.createDate.length === 0 ? '' : this.createDate[0]
                this.searchForm.endCreateTime = this.createDate.length === 0 ? '' : this.createDate[1]

                axios.post('../withdrawlog/queryWithdrawLogPageList', Qs.stringify(this.searchForm)).then(function (response) {
                    if (response.data.code === 0) {
                        var list = response.data.data.list
                        var statictics = response.data.data.statictics

                        var tableData = []
                        for (var withdrawlog of list) {
                            var currency = withdrawlog.currency
                            var type = withdrawlog.type
                            if (currency === 'BRL' && type === '4') {
                                withdrawlog.BankCardNo = withdrawlog.pixKey
                            }
                            withdrawlog.type = formatWithdrawType(withdrawlog)

                            withdrawlog.amount = formatAmount(withdrawlog.amount)
                            withdrawlog.platformFee = formatAmount(withdrawlog.platformFee)
                            withdrawlog.thirdFee = formatAmount(withdrawlog.thirdFee)

                            var status = withdrawlog.status
                            status = status === 2 ? '成功' : status === -2 ? '失败' : '处理中'
                            withdrawlog.status = status

                            var syncCnt = withdrawlog.syncCnt
                            syncCnt = syncCnt === 1 ? '同步成功' : syncCnt === 0 ? '未回调' : '同步失败'
                            withdrawlog.syncCnt = syncCnt

                            withdrawlog.createTime = dateFormate(withdrawlog.createTime)

                            tableData.push(withdrawlog)
                        }
                        that.tableData = tableData
                        that.total = statictics.allWithdrawNum
                        that.fullscreenLoading = false
                    }
                })
            },
            search() {
                this.searchForm.page = 1
                this.queryAllWithdrawLog()
            },
            resetForm(name) {
                this.$refs['searchForm'].resetFields()
                this.createDate = []
                this.searchForm.startCreateTime = ''
                this.searchForm.endCreateTime = ''
                this.searchForm.startPayTime = ''
                this.searchForm.endPayTime = ''
            },
            pageChange(cur) {
                this.searchForm.page = cur
                this.queryAllWithdrawLog()
            },
            closeDialog() {
                this.dialog.visible = false
                this.dialog.isInsert = true
            },
            openSendNotifyMsgDrawer(data) {
                this.sendNotifyMsgForm.id = ''
                this.sendNotifyMsgForm.id = data.id
                this.sendNotifyMsgForm.url = ''
                this.sendNotifyMsgForm.url = data.notifyUrl
                this.sendNotifyMsgForm.notifyData = ''
                this.sendNotifyMsgForm.notifyResp = ''
                this.sendNotifyMsgForm.notifyAnalyze = ''
                this.sendNotifyDrawerVisable = true
            },
            sendNotifyMsg(id) {
                var that = this
                that.sending = true
                return new Promise(resolve => {
                    axios({
                        method: 'post',
                        url: '../wdlog/sendNotifyMsg.action',
                        data: 'id=' + id
                    }).then(function (response) {
                        if (response.data.code === 0 || response.data.code === -1) {
                            var data = JSON.parse(response.data.data)
                            that.sendNotifyMsgForm.notifyData = data.notifyData
                            that.sendNotifyMsgForm.notifyResp = data.notifyResp

                            console.log(data.notifyResp)
                            console.log(data.notifyResp + '' == 'SUCCESS')
                            if (data.notifyResp + '' == 'SUCCESS') {
                                that.sendNotifyMsgForm.notifyAnalyze = '回调通知发送成功，收到对方处理完回调数据响应，同步成功。'
                                that.queryAllWithdrawLog()
                            } else {
                                that.sendNotifyMsgForm.notifyAnalyze = '回调异常，对方响应错误。错误可能原因：' +
                                    '1.对方收到回调数据，对方未处理或处理完数据没有返回大写"SUCCESS"。' +
                                    '2.回调地址错误，对方未收到回调数据。' +
                                    '解决方法：' +
                                    '1.确认商户回调地址是否正确。' +
                                    '2.若回调地址无误，和商户确认是否接收到回调数据。' +
                                    '3.若商户收到我方的回调请求，却未接收到回调数据，让商户尝试更换适合JSON数据的接收方式。' +
                                    '4.若商户需要回调数据进行测试，可复制上方回调数据发送给商户。' +
                                    '5.商户确认修改无误后可再次尝试补发回调通知。'
                            }
                        }
                        that.sending = false
                    })

                });
            },
            handleClose(done) {
                done();
            },
            cancelNotifyMsgDrawer() {
                this.sendNotifyDrawerVisable = false
                this.sendNotifyMsgForm.notifyData = ''
                this.sendNotifyMsgForm.notifyResp = ''
                this.sendNotifyMsgForm.notifyAnalyze = ''
            },
            initCpinfo() {
                var data = JSON.parse(sessionStorage.getItem("cpinfo"))
                this.cpinfo.country = data.country
                console.log(this.cpinfo.country)
            },
            exportWithdrawLog() {
                console.log(this.searchForm)
                //编码防止中文字符乱码
                window.location.href = encodeURI("/withdrawlog/exportWithdrawLog?id=" + this.searchForm.id + "&appId=" + this.searchForm.appId + "&amount=" + this.searchForm.amount + "&orderId=" + this.searchForm.orderId + "&type=" + this.searchForm.type + "&status=" + this.searchForm.status + "&syncCnt=" + this.searchForm.syncCnt + "&bankCardNo=" + this.searchForm.bankCardNo + "&cpf=" + this.searchForm.cpf + "&pix_key=" + this.searchForm.pix_key + "&startCreateTime=" +( this.searchForm.startCreateTime  === undefined ? "" : this.searchForm.startCreateTime) + "&endCreateTime=" + (this.searchForm.endCreateTime === undefined ? "" : this.searchForm.endCreateTime));
            }
        }
    })
</script>
<style lang="less">

</style>
</html>
